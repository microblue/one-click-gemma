<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>What's new · Gemma · for OpenClaw</title>
  <meta name="description" content="Recent changes and releases of the Gemma one-click installer for OpenClaw." />
  <style>
    :root {
      --bg: #0b0c0e;
      --fg: #f5f6f8;
      --dim: #8b8f96;
      --card: #15171b;
      --border: #22252b;
      --accent: #ff6b3d;
      --accent-hover: #ff8458;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
            "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .lang-toggle {
      position: fixed;
      top: 18px; right: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 6px 12px;
      border-radius: 6px;
      font: 12px/1 inherit;
      cursor: pointer;
      z-index: 10;
    }
    .lang-toggle:hover { color: var(--fg); border-color: var(--fg); }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--dim);
      font-size: 14px;
      text-decoration: none;
      margin-bottom: 24px;
    }
    .back:hover { color: var(--fg); }
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .lead {
      color: var(--dim);
      margin-bottom: 40px;
    }
    .lead a { color: var(--accent); text-decoration: none; }
    .lead a:hover { color: var(--accent-hover); }

    .state {
      color: var(--dim);
      padding: 40px 0;
      text-align: center;
    }

    .release {
      border-top: 1px solid var(--border);
      padding: 28px 0;
    }
    .release:first-of-type { border-top: none; padding-top: 8px; }
    .rel-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }
    .rel-tag {
      background: var(--accent);
      color: #fff;
      padding: 3px 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    .rel-title {
      font-weight: 600;
      font-size: 17px;
    }
    .rel-date {
      color: var(--dim);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      margin-left: auto;
    }
    .rel-body {
      color: var(--fg);
      font-size: 14px;
      line-height: 1.7;
    }
    .rel-body h2, .rel-body h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--dim);
      margin: 18px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .rel-body ul { list-style: none; padding: 0; }
    .rel-body li {
      padding: 3px 0;
      padding-left: 18px;
      position: relative;
    }
    .rel-body li::before {
      content: "▸";
      position: absolute;
      left: 0;
      color: var(--accent);
    }
    .rel-body code {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .rel-body a {
      color: var(--accent);
      text-decoration: none;
    }
    .rel-body a:hover { text-decoration: underline; }
    .rel-body strong { color: var(--fg); font-weight: 600; }
    .rel-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--dim);
      font-size: 13px;
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
    }
    .rel-link:hover { color: var(--fg); text-decoration-color: var(--fg); }

    .foot {
      margin-top: 60px;
      color: var(--dim);
      font-size: 12px;
      text-align: center;
    }
    .foot a { color: var(--dim); }
    .foot a:hover { color: var(--fg); }
  </style>
</head>
<body>
  <button class="lang-toggle" id="lang-toggle" aria-label="Switch language">EN</button>

  <div class="wrap">
    <a class="back" href="/"><span data-i18n="back">← 回首页</span></a>

    <h1 data-i18n="title">更新日志</h1>
    <p class="lead" data-i18n="lead">
      每个版本自动从 GitHub Releases 抓取 · <a href="https://github.com/microblue/one-click-gemma/releases" target="_blank" rel="noreferrer" data-i18n="viewOnGithub">在 GitHub 查看</a>
    </p>

    <div id="releases">
      <div class="state" data-i18n="loading">加载中…</div>
    </div>

    <p class="foot">
      <a href="/" data-i18n="footerHome">← Gemma · 一键安装</a>
    </p>
  </div>

  <script>
    // ---------------- i18n ----------------
    var TR = {
      zh: {
        pageTitle:    "更新日志 · Gemma · for OpenClaw",
        back:         "← 回首页",
        title:        "更新日志",
        lead:         null,  // lead contains HTML, handled in applyLang
        leadPrefix:   "每个版本自动从 GitHub Releases 抓取 · ",
        viewOnGithub: "在 GitHub 查看",
        loading:      "加载中…",
        noReleases:   "还没有正式版本发布",
        apiFailed:    "无法从 GitHub 加载更新记录，请直接看",
        footerHome:   "← Gemma · 一键安装",
        dateLocale:   "zh-CN"
      },
      en: {
        pageTitle:    "What's new · Gemma · for OpenClaw",
        back:         "← Back to home",
        title:        "What's new",
        lead:         null,
        leadPrefix:   "Pulled live from GitHub Releases · ",
        viewOnGithub: "View on GitHub",
        loading:      "Loading…",
        noReleases:   "No releases published yet",
        apiFailed:    "Couldn't load release notes from GitHub, try",
        footerHome:   "← Gemma · one-click install",
        dateLocale:   "en-US"
      }
    };

    function detectLang() {
      try {
        var saved = localStorage.getItem("lang");
        if (saved === "zh" || saved === "en") return saved;
      } catch (_) {}
      var nav = (navigator.language || "").toLowerCase();
      return nav.indexOf("zh") === 0 ? "zh" : "en";
    }
    var currentLang = detectLang();

    function applyLang(lang) {
      currentLang = lang;
      var t = TR[lang];
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.title = t.pageTitle;
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        var k = el.dataset.i18n;
        if (t[k] != null) el.textContent = t[k];
      });
      // lead has a nested <a>; rebuild
      var lead = document.querySelector(".lead");
      lead.innerHTML = t.leadPrefix +
        '<a href="https://github.com/microblue/one-click-gemma/releases" target="_blank" rel="noreferrer">' +
        t.viewOnGithub + '</a>';
      document.getElementById("lang-toggle").textContent = lang === "zh" ? "EN" : "中";
      // re-render dates if we've already loaded releases
      if (window.__releases) renderReleases(window.__releases);
      try { localStorage.setItem("lang", lang); } catch (_) {}
    }

    // ---------------- markdown-ish to HTML ----------------
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function mdToHtml(md) {
      if (!md) return "";
      var lines = md.replace(/\r\n/g, "\n").split("\n");
      var out = "";
      var inList = false;
      lines.forEach(function (raw) {
        var line = raw;
        // auto-link bare URLs
        var linked = esc(line).replace(/(https?:\/\/[^\s<]+)/g, function (u) {
          return '<a href="' + u + '" target="_blank" rel="noreferrer">' + u + '</a>';
        });
        // inline code: `x`
        linked = linked.replace(/`([^`]+)`/g, "<code>$1</code>");
        // bold: **x**
        linked = linked.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

        if (/^## /.test(line)) {
          if (inList) { out += "</ul>"; inList = false; }
          out += "<h3>" + esc(line.replace(/^## /, "")) + "</h3>";
        } else if (/^### /.test(line)) {
          if (inList) { out += "</ul>"; inList = false; }
          out += "<h3>" + esc(line.replace(/^### /, "")) + "</h3>";
        } else if (/^\s*[-*] /.test(line)) {
          if (!inList) { out += "<ul>"; inList = true; }
          out += "<li>" + linked.replace(/^\s*[-*] /, "") + "</li>";
        } else if (line.trim() === "") {
          if (inList) { out += "</ul>"; inList = false; }
        } else {
          if (inList) { out += "</ul>"; inList = false; }
          out += "<p>" + linked + "</p>";
        }
      });
      if (inList) out += "</ul>";
      return out;
    }

    // ---------------- fetch + render ----------------
    function fmtDate(iso) {
      try {
        var d = new Date(iso);
        return d.toLocaleDateString(TR[currentLang].dateLocale,
          { year: "numeric", month: "short", day: "numeric" });
      } catch (_) {
        return iso.slice(0, 10);
      }
    }

    function renderReleases(releases) {
      window.__releases = releases;
      var root = document.getElementById("releases");
      if (!releases || !releases.length) {
        root.innerHTML = '<div class="state">' + TR[currentLang].noReleases + '</div>';
        return;
      }
      root.innerHTML = releases.map(function (r) {
        return '' +
          '<section class="release">' +
            '<div class="rel-head">' +
              '<span class="rel-tag">' + esc(r.tag_name) + '</span>' +
              (r.name && r.name !== r.tag_name ? '<span class="rel-title">' + esc(r.name) + '</span>' : '') +
              '<span class="rel-date">' + fmtDate(r.published_at) + '</span>' +
            '</div>' +
            '<div class="rel-body">' + mdToHtml(r.body || '') + '</div>' +
            '<a class="rel-link" href="' + esc(r.html_url) + '" target="_blank" rel="noreferrer">' +
              (currentLang === 'zh' ? 'GitHub 上查看 →' : 'View on GitHub →') +
            '</a>' +
          '</section>';
      }).join('');
    }

    function loadReleases() {
      var root = document.getElementById("releases");
      fetch("https://api.github.com/repos/microblue/one-click-gemma/releases", {
        headers: { Accept: "application/vnd.github+json" }
      })
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function (data) {
          renderReleases(data);
        })
        .catch(function (e) {
          root.innerHTML =
            '<div class="state">' + TR[currentLang].apiFailed + ' ' +
            '<a href="https://github.com/microblue/one-click-gemma/releases" target="_blank" rel="noreferrer">' +
              (currentLang === 'zh' ? 'GitHub Releases' : 'GitHub Releases') +
            '</a></div>';
        });
    }

    // ---------------- boot ----------------
    document.getElementById("lang-toggle").addEventListener("click", function () {
      applyLang(currentLang === "zh" ? "en" : "zh");
    });
    applyLang(currentLang);
    loadReleases();
  </script>
</body>
</html>
