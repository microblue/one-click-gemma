name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Fast pre-check: Rust unit tests + install.sh static+behavioural tests.
  # If this fails we don't waste 20 min on the full Tauri build matrix.
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Linux deps (webkit etc. are required for the crate graph)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            shellcheck

      - name: shellcheck linux/install.sh
        run: shellcheck -s sh linux/install.sh

      - name: bash test suite for install.sh
        run: bash tests/install_sh_test.sh

      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --lib --no-fail-fast

  # -------------------------------------------------------------------------
  # Cross-platform installer builds.
  # -------------------------------------------------------------------------
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact-glob: "app/src-tauri/target/*/release/bundle/dmg/*.dmg"
          - os: windows-latest
            artifact-glob: "app/src-tauri/target/release/bundle/nsis/*.exe"
          - os: ubuntu-22.04
            artifact-glob: |
              app/src-tauri/target/release/bundle/appimage/*.AppImage
              app/src-tauri/target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Add macOS targets
        if: matrix.os == 'macos-14'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (macOS universal)
        if: matrix.os == 'macos-14'
        working-directory: app
        run: cargo tauri build --target universal-apple-darwin --bundles dmg

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: app
        run: cargo tauri build --bundles nsis

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-22.04'
        working-directory: app
        run: cargo tauri build --bundles appimage,deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

      # ---------- Windows smoke test: install silently, launch, screenshot ----
      - name: Smoke-test the Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $exe = Get-ChildItem 'app/src-tauri/target/release/bundle/nsis/*.exe' |
                   Select-Object -First 1
          if (-not $exe) { throw 'no NSIS installer found after build' }
          Write-Host "[1/5] installing $($exe.Name) silently (exit & log)..."
          $p = Start-Process -FilePath $exe.FullName `
                             -ArgumentList '/S' -Wait -PassThru
          Write-Host "NSIS exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "NSIS /S failed, exit=$($p.ExitCode)" }

          Write-Host '[2/5] locating installed executable...'
          # Tauri 2 NSIS currentUser => %LOCALAPPDATA%\<ProductName>\
          # perMachine              => %ProgramFiles%\<ProductName>\
          $candidates = @(
            "${env:LOCALAPPDATA}\GemmaInstaller\gemma-installer.exe",
            "${env:LOCALAPPDATA}\Programs\GemmaInstaller\gemma-installer.exe",
            "${env:ProgramFiles}\GemmaInstaller\gemma-installer.exe",
            "${env:ProgramFiles(x86)}\GemmaInstaller\gemma-installer.exe"
          )
          $installed = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $installed) {
            Write-Host 'not at expected paths. Diagnostics follow.'
            Write-Host '--- HKCU Uninstall entries ---'
            Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*',
                             'HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*',
                             'HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*' `
                             -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -like '*Gemma*' -or $_.Publisher -like '*gemma*' } |
              Select-Object DisplayName, InstallLocation, UninstallString
            Write-Host '--- recent gemma-installer.exe files (depth 4) ---'
            $roots = @(
              $env:LOCALAPPDATA,
              "${env:LOCALAPPDATA}\Programs",
              $env:ProgramFiles,
              ${env:ProgramFiles(x86)},
              'C:\Users'
            ) | Where-Object { $_ -and (Test-Path $_) }
            foreach ($r in $roots) {
              Write-Host "scanning $r (depth 4)..."
              Get-ChildItem -Path $r -Recurse -Depth 4 -Filter 'gemma-installer.exe' `
                            -ErrorAction SilentlyContinue |
                Select-Object -First 3 | ForEach-Object {
                  Write-Host "  hit: $($_.FullName)"
                  if (-not $installed) { $installed = $_.FullName }
                }
            }
            if (-not $installed) { throw 'installed exe not found anywhere' }
          }
          Write-Host "found: $installed"

          Write-Host '[3/5] launching app...'
          $proc = Start-Process -FilePath $installed -PassThru
          Start-Sleep -Seconds 3

          Write-Host '[4/5] waiting up to 30s for the Tauri window to appear...'
          $found = $null
          for ($i = 0; $i -lt 30; $i++) {
            if ($proc.HasExited) {
              throw "process exited early after ${i}s with exit=$($proc.ExitCode)"
            }
            $proc.Refresh()
            if ($proc.MainWindowTitle) {
              $found = $proc.MainWindowTitle
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not $found) {
            Write-Host '::warning::no window title detected — taking screenshot anyway for diagnosis'
          } else {
            Write-Host "window title: $found"
          }

          # WebView2 renders the title bar immediately but loads + paints the
          # HTML/CSS/JS a beat later. Give it ~8s so the screenshot captures
          # real content, not a blank white webview.
          Write-Host 'waiting 8s for WebView2 to finish painting content...'
          Start-Sleep -Seconds 8

          Write-Host '[5/5] capturing full-screen screenshot...'
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $outDir = "${env:GITHUB_WORKSPACE}\smoke"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $bmp.Save("$outDir\windows-smoke.png")
          $g.Dispose(); $bmp.Dispose()
          Write-Host 'screenshot saved'

          # cleanup
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }

          if (-not $found) {
            throw 'smoke test: no window appeared in 20s — see screenshot artifact'
          }
          if ($found -notlike '*Gemma*') {
            throw "smoke test: window title was '$found' not 'Gemma 4 …'"
          }
          Write-Host 'SMOKE OK: Windows installer produced a live Tauri window'

      - name: Upload Windows smoke screenshot
        if: always() && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-screenshot
          path: smoke/*.png
          if-no-files-found: ignore

      # ---------- macOS smoke test: mount dmg, install, launch, screenshot ----
      - name: Smoke-test the macOS DMG
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          DMG=$(find app/src-tauri/target -name '*.dmg' | head -1)
          test -n "$DMG" || { echo 'no DMG found after build' >&2; exit 1; }
          echo "[1/5] mounting $DMG..."
          mkdir -p /tmp/mnt smoke
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint /tmp/mnt

          echo '[2/5] copying .app to /Applications and dropping quarantine...'
          APP_SRC=$(find /tmp/mnt -maxdepth 2 -name '*.app' -type d | head -1)
          test -n "$APP_SRC" || { hdiutil detach /tmp/mnt; echo 'no .app in DMG'; exit 1; }
          cp -R "$APP_SRC" /Applications/
          hdiutil detach /tmp/mnt
          APP="/Applications/$(basename "$APP_SRC")"
          xattr -dr com.apple.quarantine "$APP" || true
          echo "installed: $APP"

          echo '[3/5] launching...'
          open "$APP"

          echo '[4/5] waiting up to 20s for the process + a window to appear...'
          FOUND_PROC=""
          FOUND_WIN=""
          for i in $(seq 1 20); do
            if pgrep -f 'gemma-installer' >/dev/null 2>&1; then
              FOUND_PROC=yes
              # try to enumerate visible window titles via System Events.
              # If accessibility is ungranted, this returns an error — treat as best-effort.
              WIN=$(osascript -e 'tell application "System Events" to get title of every window of every process whose background only is false' 2>/dev/null || true)
              if echo "$WIN" | grep -qi 'Gemma'; then
                FOUND_WIN="$WIN"
                break
              fi
            fi
            sleep 1
          done
          echo "process alive: ${FOUND_PROC:-no}"
          echo "window hit:    ${FOUND_WIN:-none (accessibility likely denied on CI)}"

          echo '[5/5] screenshotting the main display...'
          screencapture -x smoke/macos-smoke.png
          ls -la smoke/

          # cleanup
          pkill -f gemma-installer || true
          osascript -e 'tell application "GemmaInstaller" to quit' 2>/dev/null || true

          # Fail the job only if the process never started; a window-title miss
          # can be a false negative when Accessibility permission isn't granted.
          if [ -z "$FOUND_PROC" ]; then
            echo '::error::gemma-installer process never appeared — app crashed or never launched'
            exit 1
          fi
          echo 'SMOKE OK: macOS DMG installed and the app launched without crashing'

      - name: Upload macOS smoke screenshot
        if: always() && matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: macos-smoke-screenshot
          path: smoke/*.png
          if-no-files-found: ignore

      # ---------- Linux AppImage smoke: Xvfb + launch + screenshot ----------
      - name: Install GUI smoke tools (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get install -y xvfb xdotool imagemagick x11-utils fonts-noto-cjk

      - name: Smoke-test the Linux AppImage (GUI)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find app/src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          test -n "$APP" || { echo 'no AppImage built' >&2; exit 1; }
          chmod +x "$APP"
          mkdir -p smoke

          export DISPLAY=:99
          echo '[1/4] starting Xvfb on :99 (1280x800x24)...'
          Xvfb :99 -screen 0 1280x800x24 >/tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          sleep 1
          xdpyinfo -display :99 >/dev/null

          echo '[2/4] launching AppImage...'
          "$APP" >/tmp/appimage.log 2>&1 &
          APP_PID=$!

          echo '[3/4] waiting up to 30s for Tauri window...'
          WID=''
          for i in $(seq 1 30); do
            WID=$(xdotool search --name 'Gemma 4' 2>/dev/null | head -1 || true)
            if [ -n "$WID" ]; then break; fi
            kill -0 $APP_PID 2>/dev/null || { echo 'app died before window'; tail /tmp/appimage.log; exit 1; }
            sleep 1
          done
          if [ -z "$WID" ]; then
            echo '::error::no Gemma window found in 30s'
            echo '--- app log ---'; tail -40 /tmp/appimage.log
            exit 1
          fi
          echo "window id: $WID (title: $(xdotool getwindowname "$WID"))"

          # Give WebView (WebKitGTK) ~8s to paint HTML content
          sleep 8

          echo '[4/4] screenshot...'
          import -window "$WID" smoke/linux-smoke.png || import -window root smoke/linux-smoke.png
          ls -la smoke/
          file smoke/linux-smoke.png

          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true
          echo 'SMOKE OK: Linux AppImage opened a Tauri window under Xvfb'

      - name: Upload Linux GUI smoke screenshot
        if: always() && matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-smoke-screenshot
          path: smoke/*.png
          if-no-files-found: ignore

      # ---------- install.sh Docker smoke: run the shell script end-to-end --
      # Uses the tiny gemma3:270m (~292 MB) so we can exercise the real
      # `ollama pull` path in CI without pulling the production-default 7.2 GB.
      - name: Smoke-test linux/install.sh under docker (ubuntu:24.04)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/src:ro" ubuntu:24.04 bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq >/dev/null
            apt-get install -qq -y curl ca-certificates sudo python3 procps >/dev/null

            echo "=== run install.sh --yes --model gemma3:270m --no-openclaw (real pull) ==="
            sh /src/linux/install.sh --yes --model gemma3:270m --no-openclaw

            echo "=== verify API liveness ==="
            curl -fsS --max-time 5 http://127.0.0.1:11434/api/version
            echo
            echo "=== verify the tiny model is actually pulled ==="
            curl -fsS --max-time 5 http://127.0.0.1:11434/v1/models | python3 -c "import json,sys; d=json.load(sys.stdin); ids=[m[\"id\"] for m in d.get(\"data\",[])]; assert \"gemma3:270m\" in ids, ids; print(\"pulled ok:\", ids)"

            echo "=== verify /v1/chat/completions actually generates text ==="
            R=$(curl -fsS --max-time 120 http://127.0.0.1:11434/v1/chat/completions \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"gemma3:270m\",\"messages\":[{\"role\":\"user\",\"content\":\"say hi in 3 words\"}],\"stream\":false}")
            echo "$R" | python3 -c "import json,sys; r=json.load(sys.stdin); c=r[\"choices\"][0][\"message\"][\"content\"]; assert len(c.strip())>0, r; print(\"chat OK:\", c.strip()[:80])"

            echo "=== verify OpenClaw injection preserves siblings & upserts ==="
            mkdir -p /root/.openclaw
            echo "{\"theme\":\"dark\",\"customProviders\":[{\"name\":\"local-gemma4\",\"baseURL\":\"http://stale\",\"apiKey\":\"OLD\"}]}" > /root/.openclaw/config.json
            export HOME=/root
            sh /src/linux/install.sh --yes --model gemma3:270m
            python3 -c "import json; c=json.load(open(\"/root/.openclaw/config.json\")); ps=c[\"customProviders\"]; assert len(ps)==1, ps; assert ps[0][\"name\"]==\"local-gemma4\", ps; assert ps[0][\"apiKey\"]==\"ollama\", ps; assert c[\"theme\"]==\"dark\"; print(\"upsert OK, providers=\", ps)"

            echo "=== all docker smoke assertions passed ==="
          '

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            linux/install.sh
          generate_release_notes: true
