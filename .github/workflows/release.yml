name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Fast pre-check: Rust unit tests + install.sh static+behavioural tests.
  # If this fails we don't waste 20 min on the full Tauri build matrix.
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Linux deps (webkit etc. are required for the crate graph)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            shellcheck

      - name: shellcheck linux/install.sh
        run: shellcheck -s sh linux/install.sh

      - name: bash test suite for install.sh
        run: bash tests/install_sh_test.sh

      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --lib --no-fail-fast

  # -------------------------------------------------------------------------
  # Cross-platform installer builds.
  # -------------------------------------------------------------------------
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact-glob: "app/src-tauri/target/*/release/bundle/dmg/*.dmg"
          - os: windows-latest
            artifact-glob: "app/src-tauri/target/release/bundle/nsis/*.exe"
          - os: ubuntu-22.04
            artifact-glob: |
              app/src-tauri/target/release/bundle/appimage/*.AppImage
              app/src-tauri/target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Add macOS targets
        if: matrix.os == 'macos-14'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (macOS universal)
        if: matrix.os == 'macos-14'
        working-directory: app
        run: cargo tauri build --target universal-apple-darwin --bundles dmg

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: app
        run: cargo tauri build --bundles nsis

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-22.04'
        working-directory: app
        run: cargo tauri build --bundles appimage,deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            linux/install.sh
          generate_release_notes: true
