name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust-target: universal-apple-darwin
            bundle: dmg
            artifact-glob: "app/src-tauri/target/*/release/bundle/dmg/*.dmg"
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundle: nsis
            artifact-glob: "app/src-tauri/target/release/bundle/nsis/*.exe"
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundle: "appimage deb"
            artifact-glob: |
              app/src-tauri/target/release/bundle/appimage/*.AppImage
              app/src-tauri/target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ---------- Rust toolchain ----------
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      # ---------- platform-specific system deps ----------
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            shellcheck

      - name: Lint linux/install.sh
        if: matrix.os == 'ubuntu-22.04'
        run: shellcheck -s sh linux/install.sh

      # ---------- macOS: extra rust target ----------
      - name: Add Apple Silicon target
        if: matrix.os == 'macos-14'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      # ---------- build ----------
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (macOS universal)
        if: matrix.os == 'macos-14'
        working-directory: app
        run: cargo tauri build --target universal-apple-darwin --bundles dmg

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: app
        run: cargo tauri build --bundles nsis

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-22.04'
        working-directory: app
        run: cargo tauri build --bundles appimage,deb

      # ---------- upload artifacts ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            linux/install.sh
          generate_release_notes: true
