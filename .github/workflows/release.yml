name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Decide whether this tag is a patch-only bump (rebuild cheap but NOT
  # needed; we can reuse the previous release's DMG/EXE with a filename
  # rename) or a minor/major bump (full Tauri rebuild required).
  #
  # Rule: compare this tag's MAJOR.MINOR to previous tag's MAJOR.MINOR.
  #   same   → patch-only, skip the build matrix
  #   diff   → rebuild everything
  # On workflow_dispatch (no tag) we always rebuild.
  # -------------------------------------------------------------------------
  plan:
    runs-on: ubuntu-22.04
    outputs:
      rebuild: ${{ steps.decide.outputs.rebuild }}
      prev_tag: ${{ steps.decide.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide rebuild vs reuse
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          THIS_REF="${GITHUB_REF#refs/tags/}"
          if [ "${GITHUB_REF}" = "${GITHUB_REF#refs/tags/v}" ]; then
            echo "workflow_dispatch (no tag) → rebuild"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          THIS_TAG="$THIS_REF"
          # Look up the most recent tag strictly before THIS_TAG that has a
          # *published* GitHub Release with downloadable assets. Orphan tags
          # (tags created but whose release never published — e.g. a CI
          # failure) are skipped so reuse targets a known-good source.
          PREV_TAG=""
          ALL=$(git tag --sort=-v:refname \
            | awk -v t="$THIS_TAG" 'found==1 {print} $0==t {found=1}')
          for candidate in $ALL; do
            # require release exists AND has at least one asset
            assets=$(gh release view "$candidate" --repo "$GITHUB_REPOSITORY" \
                       --json assets --jq '.assets | length' 2>/dev/null || echo 0)
            if [ "${assets:-0}" -gt 0 ]; then
              PREV_TAG="$candidate"
              echo "prev release tag: $candidate ($assets assets)"
              break
            else
              echo "skipping $candidate (no published release assets)"
            fi
          done

          if [ -z "$PREV_TAG" ]; then
            echo "no previous released tag → first real release, rebuild"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TV="${THIS_TAG#v}"
          PV="${PREV_TAG#v}"
          THIS_MM=$(printf '%s' "$TV" | awk -F. '{print $1"."$2}')
          PREV_MM=$(printf '%s' "$PV" | awk -F. '{print $1"."$2}')

          echo "this_tag=$THIS_TAG (major.minor=$THIS_MM)"
          echo "prev_tag=$PREV_TAG (major.minor=$PREV_MM)"

          if [ "$THIS_MM" = "$PREV_MM" ]; then
            # Patch bump usually means UI/site-only changes (reuse is safe).
            # BUT if any binary-affecting file changed between prev_tag and
            # this tag, we must rebuild — otherwise the reuse path would
            # ship stale binaries. Inspect the diff explicitly rather than
            # trusting the version number alone.
            CHANGED=$(git diff --name-only "$PREV_TAG..$THIS_TAG" -- \
              'app/src-tauri/src/' \
              'app/src-tauri/build.rs' \
              'app/src-tauri/capabilities/' \
              'app/src-tauri/icons/' \
              'app/src/' \
              'scripts/install.sh' \
              'scripts/install.ps1' 2>/dev/null)
            if [ -n "$CHANGED" ]; then
              echo "patch-level version but binary-affecting files changed:"
              echo "$CHANGED" | sed 's/^/  /'
              echo "→ forcing full rebuild"
              echo "rebuild=true" >> "$GITHUB_OUTPUT"
              echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            else
              echo "patch-only bump, no binary-affecting changes → REUSE previous binaries"
              echo "rebuild=false" >> "$GITHUB_OUTPUT"
              echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "minor/major bump → full rebuild"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------------
  # Fast pre-check: Rust unit tests + install.sh static+behavioural tests
  # + install.sh docker e2e smoke (real model pull + chat). Linux is
  # script-only, so all its "deliverable" verification lives in this job.
  # Always runs, regardless of rebuild/reuse decision.
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Linux deps (webkit etc. are required for the crate graph)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            shellcheck

      - name: shellcheck scripts/install.sh
        run: shellcheck -s sh scripts/install.sh

      - name: bash test suite for install.sh
        run: bash tests/install_sh_test.sh

      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --lib --no-fail-fast

      # ---------- headless error-path smoke: network-unreachable endpoint -----
      # Builds the bin in debug (faster than --release) and drives --headless
      # with a pointed-at-nothing endpoint. Must exit 11 (wait_ollama timeout)
      # in under ~5 s, never hang, and surface a clear diagnostic.
      - name: Build gemma-installer (debug) for headless error-path smoke
        working-directory: app/src-tauri
        run: cargo build --bin gemma-installer

      - name: Headless smoke — unreachable endpoint must fail fast with code 11
        working-directory: app/src-tauri
        run: |
          set +e
          timeout 30 ./target/debug/gemma-installer --headless \
            --skip-install --no-openclaw \
            --endpoint http://127.0.0.1:39999 \
            --model gemma3:270m > hl.out 2>&1
          code=$?
          set -e
          echo "--- headless output ---"
          cat hl.out
          echo "--- exit=$code ---"
          test "$code" = "11" || { echo "expected exit 11 (wait_ollama timeout), got $code"; exit 1; }
          grep -q "未就绪" hl.out || { echo "missing Chinese 'not ready' marker in output"; exit 1; }

      - name: Headless smoke — bogus flag must exit 2
        working-directory: app/src-tauri
        run: |
          set +e
          ./target/debug/gemma-installer --headless --bogus > hl.out 2>&1
          code=$?
          set -e
          cat hl.out
          test "$code" = "2" || { echo "expected exit 2 for bad flag, got $code"; exit 1; }
          grep -q "unknown flag" hl.out || { echo "missing 'unknown flag' diagnostic"; exit 1; }

      # ---------- install.sh Docker smoke: end-to-end with real model pull
      # Uses the tiny gemma3:270m (~292 MB) so we can exercise the real
      # `ollama pull` path in CI without pulling the production-default 7.2 GB.
      - name: Smoke-test scripts/install.sh under docker (ubuntu:24.04)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/src:ro" ubuntu:24.04 bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq >/dev/null
            apt-get install -qq -y curl ca-certificates sudo python3 procps >/dev/null

            echo "=== run install.sh --yes --model gemma3:270m --no-openclaw (real pull) ==="
            sh /src/scripts/install.sh --yes --model gemma3:270m --no-openclaw

            echo "=== verify API liveness ==="
            curl -fsS --max-time 5 http://127.0.0.1:11434/api/version
            echo
            echo "=== verify the tiny model is actually pulled ==="
            curl -fsS --max-time 5 http://127.0.0.1:11434/v1/models | python3 -c "import json,sys; d=json.load(sys.stdin); ids=[m[\"id\"] for m in d.get(\"data\",[])]; assert \"gemma3:270m\" in ids, ids; print(\"pulled ok:\", ids)"

            echo "=== verify /v1/chat/completions actually generates text ==="
            R=$(curl -fsS --max-time 120 http://127.0.0.1:11434/v1/chat/completions \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"gemma3:270m\",\"messages\":[{\"role\":\"user\",\"content\":\"say hi in 3 words\"}],\"stream\":false}")
            echo "$R" | python3 -c "import json,sys; r=json.load(sys.stdin); c=r[\"choices\"][0][\"message\"][\"content\"]; assert len(c.strip())>0, r; print(\"chat OK:\", c.strip()[:80])"

            echo "=== verify OpenClaw injection preserves siblings & upserts ==="
            mkdir -p /root/.openclaw
            echo "{\"theme\":\"dark\",\"customProviders\":[{\"name\":\"local-gemma4\",\"baseURL\":\"http://stale\",\"apiKey\":\"OLD\"}]}" > /root/.openclaw/config.json
            export HOME=/root
            sh /src/scripts/install.sh --yes --model gemma3:270m
            python3 -c "import json; c=json.load(open(\"/root/.openclaw/config.json\")); ps=c[\"customProviders\"]; assert len(ps)==1, ps; assert ps[0][\"name\"]==\"local-gemma4\", ps; assert ps[0][\"apiKey\"]==\"ollama\", ps; assert c[\"theme\"]==\"dark\"; print(\"upsert OK, providers=\", ps)"

            echo "=== all docker smoke assertions passed ==="
          '

  # -------------------------------------------------------------------------
  # Native GUI installers for Mac + Windows only.
  # Linux is script-only (see test job's docker smoke).
  # Skipped for patch-only bumps (plan.outputs.rebuild == 'false').
  # -------------------------------------------------------------------------
  build:
    needs: [plan, test]
    if: needs.plan.outputs.rebuild == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact-glob: "app/src-tauri/target/*/release/bundle/dmg/*.dmg"
          - os: windows-latest
            artifact-glob: "app/src-tauri/target/release/bundle/nsis/*.exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Add macOS targets
        if: matrix.os == 'macos-14'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (macOS universal)
        if: matrix.os == 'macos-14'
        working-directory: app
        run: cargo tauri build --target universal-apple-darwin --bundles dmg

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: app
        run: cargo tauri build --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

      # ---------- Windows smoke test: install silently, launch, screenshot ----
      - name: Smoke-test the Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $exe = Get-ChildItem 'app/src-tauri/target/release/bundle/nsis/*.exe' |
                   Select-Object -First 1
          if (-not $exe) { throw 'no NSIS installer found after build' }
          Write-Host "[1/5] installing $($exe.Name) silently (exit & log)..."
          $p = Start-Process -FilePath $exe.FullName `
                             -ArgumentList '/S' -Wait -PassThru
          Write-Host "NSIS exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "NSIS /S failed, exit=$($p.ExitCode)" }

          Write-Host '[2/5] locating installed executable...'
          $candidates = @(
            "${env:LOCALAPPDATA}\GemmaInstaller\gemma-installer.exe",
            "${env:LOCALAPPDATA}\Programs\GemmaInstaller\gemma-installer.exe",
            "${env:ProgramFiles}\GemmaInstaller\gemma-installer.exe",
            "${env:ProgramFiles(x86)}\GemmaInstaller\gemma-installer.exe"
          )
          $installed = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $installed) {
            Write-Host 'not at expected paths. Diagnostics follow.'
            Write-Host '--- HKCU Uninstall entries ---'
            Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*',
                             'HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*',
                             'HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*' `
                             -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -like '*Gemma*' -or $_.Publisher -like '*gemma*' } |
              Select-Object DisplayName, InstallLocation, UninstallString
            Write-Host '--- recent gemma-installer.exe files (depth 4) ---'
            $roots = @(
              $env:LOCALAPPDATA,
              "${env:LOCALAPPDATA}\Programs",
              $env:ProgramFiles,
              ${env:ProgramFiles(x86)},
              'C:\Users'
            ) | Where-Object { $_ -and (Test-Path $_) }
            foreach ($r in $roots) {
              Write-Host "scanning $r (depth 4)..."
              Get-ChildItem -Path $r -Recurse -Depth 4 -Filter 'gemma-installer.exe' `
                            -ErrorAction SilentlyContinue |
                Select-Object -First 3 | ForEach-Object {
                  Write-Host "  hit: $($_.FullName)"
                  if (-not $installed) { $installed = $_.FullName }
                }
            }
            if (-not $installed) { throw 'installed exe not found anywhere' }
          }
          Write-Host "found: $installed"

          Write-Host '[3/5] launching app...'
          $proc = Start-Process -FilePath $installed -PassThru
          Start-Sleep -Seconds 3

          Write-Host '[4/5] waiting up to 30s for the Tauri window to appear...'
          $found = $null
          for ($i = 0; $i -lt 30; $i++) {
            if ($proc.HasExited) {
              throw "process exited early after ${i}s with exit=$($proc.ExitCode)"
            }
            $proc.Refresh()
            if ($proc.MainWindowTitle) {
              $found = $proc.MainWindowTitle
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not $found) {
            Write-Host '::warning::no window title detected — taking screenshot anyway for diagnosis'
          } else {
            Write-Host "window title: $found"
          }

          # WebView2 renders the title bar immediately but loads + paints the
          # HTML/CSS/JS a beat later. Give it ~8s so the screenshot captures
          # real content, not a blank white webview.
          Write-Host 'waiting 8s for WebView2 to finish painting content...'
          Start-Sleep -Seconds 8

          Write-Host '[5/5] capturing full-screen screenshot...'
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $outDir = "${env:GITHUB_WORKSPACE}\smoke"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $bmp.Save("$outDir\windows-smoke.png")
          $g.Dispose(); $bmp.Dispose()
          Write-Host 'screenshot saved'

          # cleanup
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }

          if (-not $found) {
            throw 'smoke test: no window appeared in 30s — see screenshot artifact'
          }
          if ($found -notlike '*Gemma*') {
            throw "smoke test: window title was '$found' not 'Gemma 4 …'"
          }
          Write-Host 'SMOKE OK: Windows installer produced a live Tauri window'

      - name: Upload Windows smoke screenshot
        if: always() && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-screenshot
          path: smoke/*.png
          if-no-files-found: ignore

      # ---------- Windows headless smoke: full Rust-command e2e ---------------
      # Invokes the installed gemma-installer.exe with --headless to drive the
      # exact Rust command sequence the GUI triggers via invoke():
      #   install_ollama → wait_ollama → pull_model → inject_openclaw → send_chat_test
      # The release build is compiled with windows_subsystem="windows" so stdout
      # can be detached — we capture progress via GEMMA_HEADLESS_LOG file.
      - name: Headless smoke — full install+pull+chat via bundled exe (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(
            "${env:LOCALAPPDATA}\GemmaInstaller\gemma-installer.exe",
            "${env:LOCALAPPDATA}\Programs\GemmaInstaller\gemma-installer.exe",
            "${env:ProgramFiles}\GemmaInstaller\gemma-installer.exe",
            "${env:ProgramFiles(x86)}\GemmaInstaller\gemma-installer.exe"
          )
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) { throw 'gemma-installer.exe not found; NSIS install did not leave it on disk' }
          Write-Host "using: $exe"

          $log = Join-Path $env:GITHUB_WORKSPACE 'headless.log'
          $env:GEMMA_HEADLESS_LOG = $log
          Remove-Item $log -ErrorAction SilentlyContinue

          # Start-Process -PassThru + WaitForExit(timeout) — same pattern the
          # installer itself uses; survives grandchildren (Ollama tray).
          $args = @('--headless','--model','gemma3:270m','--no-openclaw','--prompt','say hi in 3 words')
          Write-Host "launching: $exe $args"
          $proc = Start-Process -FilePath $exe -ArgumentList $args -PassThru
          # 10 min — covers Ollama fresh-install (~200 MB) + gemma3:270m pull (~292 MB)
          if (-not $proc.WaitForExit(600000)) {
            try { $proc.Kill() } catch {}
            Write-Host '--- headless.log (truncated) ---'
            if (Test-Path $log) { Get-Content $log -Tail 60 | Write-Host }
            throw 'headless smoke timed out after 10 min'
          }
          $code = $proc.ExitCode
          Write-Host "--- headless.log (last 80 lines) ---"
          if (Test-Path $log) { Get-Content $log -Tail 80 | Write-Host } else { Write-Host '(no log file)' }
          Write-Host "exit=$code"

          if ($code -ne 0) { throw "headless smoke failed, exit=$code" }
          if (-not (Test-Path $log)) { throw 'headless.log was never written' }

          $content = Get-Content $log -Raw
          foreach ($must in @('[1/4]','[2/4]','[3/4]','[4b/4]','ALL STEPS PASSED','[chat] OK')) {
            if ($content -notlike "*$must*") { throw "headless.log missing marker: $must" }
          }

          # Also assert the OpenAI-compatible API is actually live after the run
          $v = curl.exe -fsS http://127.0.0.1:11434/api/version | ConvertFrom-Json
          Write-Host "ollama version: $($v.version)"
          $models = curl.exe -fsS http://127.0.0.1:11434/v1/models | ConvertFrom-Json
          $ids = @($models.data | ForEach-Object { $_.id })
          if ('gemma3:270m' -notin $ids) { throw "model not pulled by headless; ids=$ids" }
          Write-Host 'HEADLESS SMOKE OK'

      - name: Upload Windows headless log
        if: always() && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-headless-log
          path: headless.log
          if-no-files-found: ignore

      # ---------- macOS smoke test: mount dmg, install, launch, screenshot ----
      - name: Smoke-test the macOS DMG
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          DMG=$(find app/src-tauri/target -name '*.dmg' | head -1)
          test -n "$DMG" || { echo 'no DMG found after build' >&2; exit 1; }
          echo "[1/5] mounting $DMG..."
          mkdir -p /tmp/mnt smoke
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint /tmp/mnt

          echo '[2/5] copying .app to /Applications and dropping quarantine...'
          APP_SRC=$(find /tmp/mnt -maxdepth 2 -name '*.app' -type d | head -1)
          test -n "$APP_SRC" || { hdiutil detach /tmp/mnt; echo 'no .app in DMG'; exit 1; }
          cp -R "$APP_SRC" /Applications/
          hdiutil detach /tmp/mnt
          APP="/Applications/$(basename "$APP_SRC")"
          xattr -dr com.apple.quarantine "$APP" || true
          echo "installed: $APP"

          echo '[3/5] launching...'
          open "$APP"

          echo '[4/5] waiting up to 20s for the process + a window to appear...'
          FOUND_PROC=""
          FOUND_WIN=""
          for i in $(seq 1 20); do
            if pgrep -f 'gemma-installer' >/dev/null 2>&1; then
              FOUND_PROC=yes
              # try to enumerate visible window titles via System Events.
              # If accessibility is ungranted, this returns an error — treat as best-effort.
              WIN=$(osascript -e 'tell application "System Events" to get title of every window of every process whose background only is false' 2>/dev/null || true)
              if echo "$WIN" | grep -qi 'Gemma'; then
                FOUND_WIN="$WIN"
                break
              fi
            fi
            sleep 1
          done
          echo "process alive: ${FOUND_PROC:-no}"
          echo "window hit:    ${FOUND_WIN:-none (accessibility likely denied on CI)}"

          echo '[5/5] screenshotting the main display...'
          screencapture -x smoke/macos-smoke.png
          ls -la smoke/

          # cleanup
          pkill -f gemma-installer || true
          osascript -e 'tell application "GemmaInstaller" to quit' 2>/dev/null || true

          # Fail the job only if the process never started; a window-title miss
          # can be a false negative when Accessibility permission isn't granted.
          if [ -z "$FOUND_PROC" ]; then
            echo '::error::gemma-installer process never appeared — app crashed or never launched'
            exit 1
          fi
          echo 'SMOKE OK: macOS DMG installed and the app launched without crashing'

      - name: Upload macOS smoke screenshot
        if: always() && matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: macos-smoke-screenshot
          path: smoke/*.png
          if-no-files-found: ignore

      # ---------- macOS headless smoke: full Rust-command e2e ----------------
      # Drives the bundled binary inside GemmaInstaller.app with --headless,
      # exercising install_ollama → wait_ollama → pull_model → inject_openclaw
      # → send_chat_test — the same command sequence the GUI invokes.
      - name: Headless smoke — full install+pull+chat via bundled bin (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          APP="/Applications/GemmaInstaller.app"
          BIN="$APP/Contents/MacOS/gemma-installer"
          test -x "$BIN" || { ls -la "$APP/Contents/MacOS/" || true; echo "bundled bin missing at $BIN"; exit 1; }
          export GEMMA_HEADLESS_LOG="$GITHUB_WORKSPACE/headless.log"
          rm -f "$GEMMA_HEADLESS_LOG"

          echo "launching: $BIN --headless --model gemma3:270m --no-openclaw"
          set +e
          # 10 min ceiling — Ollama fresh-install via DMG + gemma3:270m pull
          timeout 600 "$BIN" --headless \
            --model gemma3:270m --no-openclaw \
            --prompt "say hi in 3 words"
          code=$?
          set -e
          echo "--- headless.log (last 80 lines) ---"
          if [ -f "$GEMMA_HEADLESS_LOG" ]; then tail -80 "$GEMMA_HEADLESS_LOG"; else echo "(no log)"; fi
          echo "exit=$code"

          test "$code" = "0" || { echo "headless smoke failed, exit=$code" >&2; exit 1; }
          test -f "$GEMMA_HEADLESS_LOG" || { echo "headless.log not written" >&2; exit 1; }

          # Required markers must all appear
          for must in "[1/4]" "[2/4]" "[3/4]" "[4b/4]" "ALL STEPS PASSED" "[chat] OK"; do
            grep -qF "$must" "$GEMMA_HEADLESS_LOG" || { echo "missing marker: $must"; exit 1; }
          done

          # Verify Ollama is actually live post-run
          curl -fsS --max-time 5 http://127.0.0.1:11434/api/version
          echo
          curl -fsS --max-time 5 http://127.0.0.1:11434/v1/models | \
            python3 -c "import json,sys; d=json.load(sys.stdin); ids=[m['id'] for m in d['data']]; assert 'gemma3:270m' in ids, ids; print('pulled ok:', ids)"
          echo 'HEADLESS SMOKE OK'

      - name: Upload macOS headless log
        if: always() && matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: macos-headless-log
          path: headless.log
          if-no-files-found: ignore

      # ---------- macOS script smoke: run scripts/install.sh directly ---------
      # Brew is pre-installed on macos-14 runners so install_ollama will take
      # the fast brew path. Uses the tiny gemma3:270m model for a real pull.
      - name: Smoke-test scripts/install.sh on macOS
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          echo "=== running scripts/install.sh --yes --model gemma3:270m --no-openclaw ==="
          bash scripts/install.sh --yes --model gemma3:270m --no-openclaw

          echo "=== /api/version ==="
          curl -fsS --max-time 5 http://127.0.0.1:11434/api/version
          echo

          echo "=== /v1/models must include gemma3:270m ==="
          curl -fsS --max-time 5 http://127.0.0.1:11434/v1/models | \
            python3 -c "import json,sys; d=json.load(sys.stdin); ids=[m['id'] for m in d['data']]; assert 'gemma3:270m' in ids, ids; print('pulled ok:', ids)"

          echo "=== /v1/chat/completions must return non-empty content ==="
          R=$(curl -fsS --max-time 120 http://127.0.0.1:11434/v1/chat/completions \
                -H 'Content-Type: application/json' \
                -d '{"model":"gemma3:270m","messages":[{"role":"user","content":"say hi in 3 words"}],"stream":false}')
          echo "$R" | python3 -c "import json,sys; r=json.load(sys.stdin); c=r['choices'][0]['message']['content']; assert len(c.strip())>0, r; print('chat OK:', c.strip()[:80])"

          echo "=== OpenClaw upsert (seeded fake config) ==="
          mkdir -p "$HOME/Library/Application Support/OpenClaw"
          CFG="$HOME/Library/Application Support/OpenClaw/config.json"
          printf '%s' '{"theme":"dark","customProviders":[{"name":"local-gemma4","baseURL":"http://stale","apiKey":"OLD"}]}' > "$CFG"
          bash scripts/install.sh --yes --model gemma3:270m
          python3 -c "import json,os; c=json.load(open(os.path.expanduser('~/Library/Application Support/OpenClaw/config.json'))); ps=c['customProviders']; assert len(ps)==1, ps; assert ps[0]['name']=='local-gemma4', ps; assert ps[0]['apiKey']=='ollama', ps; assert c['theme']=='dark'; print('upsert OK, providers=', ps)"

          echo "=== all macOS script smoke assertions passed ==="

      # ---------- Windows script smoke: run scripts/install.ps1 directly ------
      - name: Smoke-test scripts/install.ps1 on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host '=== running scripts/install.ps1 with GEMMA_MODEL=gemma3:270m ==='
          $env:GEMMA_MODEL       = 'gemma3:270m'
          $env:GEMMA_NO_OPENCLAW = '1'
          $env:GEMMA_YES         = '1'
          & pwsh -NoProfile -File scripts/install.ps1
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 exit=$LASTEXITCODE" }

          Write-Host '=== /api/version ==='
          $v = curl.exe -fsS http://127.0.0.1:11434/api/version | ConvertFrom-Json
          Write-Host "ollama version: $($v.version)"

          Write-Host '=== /v1/models must include gemma3:270m ==='
          $models = curl.exe -fsS http://127.0.0.1:11434/v1/models | ConvertFrom-Json
          $ids = @($models.data | ForEach-Object { $_.id })
          Write-Host "ids: $($ids -join ', ')"
          if ('gemma3:270m' -notin $ids) { throw "model not pulled; ids=$ids" }

          Write-Host '=== /v1/chat/completions must return non-empty content ==='
          $body = '{"model":"gemma3:270m","messages":[{"role":"user","content":"say hi in 3 words"}],"stream":false}'
          $r = curl.exe -fsS --max-time 120 -H 'Content-Type: application/json' `
                 -d $body http://127.0.0.1:11434/v1/chat/completions | ConvertFrom-Json
          $c = $r.choices[0].message.content
          if ([string]::IsNullOrWhiteSpace($c)) { throw 'empty chat reply' }
          Write-Host "chat OK: $c"

          Write-Host '=== OpenClaw upsert (seeded fake config) ==='
          $cfgDir = Join-Path $env:APPDATA 'OpenClaw'
          New-Item -ItemType Directory -Force -Path $cfgDir | Out-Null
          $cfg = Join-Path $cfgDir 'config.json'
          '{"theme":"dark","customProviders":[{"name":"local-gemma4","baseURL":"http://stale","apiKey":"OLD"}]}' | Set-Content -Path $cfg -Encoding UTF8
          Remove-Item Env:GEMMA_NO_OPENCLAW
          & pwsh -NoProfile -File scripts/install.ps1
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 exit=$LASTEXITCODE (2nd run)" }
          $j = Get-Content $cfg -Raw | ConvertFrom-Json
          $ps = @($j.customProviders)
          if ($ps.Count -ne 1) { throw "expected 1 provider, got $($ps.Count): $($ps | ConvertTo-Json)" }
          if ($ps[0].name -ne 'local-gemma4') { throw "wrong name: $($ps[0].name)" }
          if ($ps[0].apiKey -ne 'ollama') { throw "stale apiKey kept: $($ps[0].apiKey)" }
          if ($j.theme -ne 'dark') { throw "theme lost: $($j.theme)" }
          Write-Host 'upsert OK, customProviders:'
          $ps | ConvertTo-Json -Depth 5 | Write-Host

          Write-Host '=== all Windows script smoke assertions passed ==='

  # -------------------------------------------------------------------------
  # Patch-only path: reuse previous release's DMG + EXE, rename them to the
  # new version, repackage scripts from the current checkout. Runs on the
  # cheap ubuntu-latest runner only — no Tauri compile, no Mac/Win builders.
  # -------------------------------------------------------------------------
  reuse:
    needs: [plan, test]
    if: needs.plan.outputs.rebuild == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Pull previous release's binaries
        env:
          GH_TOKEN: ${{ github.token }}
          PREV:     ${{ needs.plan.outputs.prev_tag }}
        run: |
          set -euo pipefail
          mkdir -p prev dist-reused
          # Download ONLY binaries from previous release. Scripts + version-
          # stripped stable names come from the current checkout so docs
          # and flags in install.sh/ps1 are up to date.
          gh release download "$PREV" \
            --repo "$GITHUB_REPOSITORY" \
            --dir prev \
            --pattern 'GemmaInstaller_*universal*.dmg' \
            --pattern 'GemmaInstaller_*x64-setup*.exe' || true
          ls -la prev

      - name: Rename versioned artifacts with this tag's version
        run: |
          set -euo pipefail
          THIS=${GITHUB_REF#refs/tags/}
          TV=${THIS#v}
          PREV=${{ needs.plan.outputs.prev_tag }}
          PV=${PREV#v}
          mkdir -p installer-macos-14 installer-windows-latest
          for f in prev/GemmaInstaller_${PV}_*.dmg; do
            [ -e "$f" ] || continue
            new=$(basename "$f" | sed "s/_${PV}_/_${TV}_/")
            cp "$f" "installer-macos-14/$new"
          done
          for f in prev/GemmaInstaller_${PV}_*.exe; do
            [ -e "$f" ] || continue
            new=$(basename "$f" | sed "s/_${PV}_/_${TV}_/")
            cp "$f" "installer-windows-latest/$new"
          done
          echo '--- renamed mac ---'; ls -la installer-macos-14
          echo '--- renamed win ---'; ls -la installer-windows-latest

      # After rename, verify the bytes are intact and the files look like
      # what they claim to be. Guards against subtle rename/copy bugs and
      # ensures we never publish a zero-byte or mis-magic-number artifact.
      - name: Verify renamed artifacts are bit-identical and well-formed
        run: |
          set -euo pipefail
          fail=0

          check_copy() {
            local src="$1" dst="$2"
            if [ ! -s "$dst" ]; then
              echo "::error::renamed artifact $dst is empty or missing"; fail=1; return
            fi
            local ss; ss=$(stat -c%s "$src")
            local ds; ds=$(stat -c%s "$dst")
            if [ "$ss" != "$ds" ]; then
              echo "::error::size mismatch $src ($ss) vs $dst ($ds)"; fail=1; return
            fi
            local sh; sh=$(sha256sum "$src" | awk '{print $1}')
            local dh; dh=$(sha256sum "$dst" | awk '{print $1}')
            if [ "$sh" != "$dh" ]; then
              echo "::error::sha256 mismatch $src vs $dst"; fail=1; return
            fi
            echo "  ok: $(basename "$dst") $ds bytes sha=$dh"
          }

          echo '--- mac artifacts ---'
          for f in prev/GemmaInstaller_*.dmg; do
            [ -e "$f" ] || continue
            PV=$(echo "$f" | sed -n 's/.*GemmaInstaller_\([^_]*\)_.*/\1/p')
            TV="${GITHUB_REF#refs/tags/v}"
            new="installer-macos-14/$(basename "$f" | sed "s/_${PV}_/_${TV}_/")"
            # DMG first 8 bytes don't have a fixed magic (trailing "koly" marker
            # at EOF is the real signature). Check tail instead — it's cheap.
            tail -c 4 "$new" > /tmp/tail.bin
            if ! grep -q "koly" /tmp/tail.bin 2>/dev/null; then
              # Some DMGs have the koly block not exactly at EOF; accept if
              # "koly" appears in the last 512 bytes.
              if ! tail -c 512 "$new" | grep -q "koly"; then
                echo "::error::$new does not look like a DMG (missing koly trailer)"
                fail=1
                continue
              fi
            fi
            check_copy "$f" "$new"
          done

          echo '--- windows artifacts ---'
          for f in prev/GemmaInstaller_*.exe; do
            [ -e "$f" ] || continue
            PV=$(echo "$f" | sed -n 's/.*GemmaInstaller_\([^_]*\)_.*/\1/p')
            TV="${GITHUB_REF#refs/tags/v}"
            new="installer-windows-latest/$(basename "$f" | sed "s/_${PV}_/_${TV}_/")"
            # PE: first two bytes must be "MZ" (0x4D 0x5A)
            magic=$(head -c 2 "$new" | xxd -p)
            if [ "$magic" != "4d5a" ]; then
              echo "::error::$new does not start with MZ (got $magic); not a PE binary"
              fail=1
              continue
            fi
            check_copy "$f" "$new"
          done

          if [ "$fail" != "0" ]; then
            echo "::error::reuse verification failed"; exit 1
          fi
          echo 'REUSE VERIFY OK — all renamed artifacts are bit-identical and magic-valid'

      - name: Re-upload as actions artifacts for the release job
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-14
          path: installer-macos-14/*
          if-no-files-found: error

      - name: Re-upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows-latest
          path: installer-windows-latest/*
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Publish the GitHub Release. Runs after EITHER build (rebuild=true) OR
  # reuse (rebuild=false) produced the installer-{macos-14,windows-latest}
  # actions artifacts.
  # -------------------------------------------------------------------------
  release:
    needs: [plan, build, reuse]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.build.result == 'success' || needs.reuse.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      # Stage assets with stable, unversioned filenames so
      # github.com/<repo>/releases/latest/download/<name> permalinks
      # never change across version bumps. (Keep the versioned ones too
      # for users who want reproducible pinning.)
      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          DMG=$(find dist -name '*.dmg' | head -1)
          EXE=$(find dist -name '*.exe' | head -1)
          test -n "$DMG" || { echo 'no DMG found' >&2; exit 1; }
          test -n "$EXE" || { echo 'no EXE found' >&2; exit 1; }
          cp "$DMG" release-assets/GemmaInstaller.dmg
          cp "$EXE" release-assets/GemmaInstaller-setup.exe
          cp "$DMG" "release-assets/$(basename "$DMG")"
          cp "$EXE" "release-assets/$(basename "$EXE")"
          cp scripts/install.sh  release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
